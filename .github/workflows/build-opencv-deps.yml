name: Build OpenCV and ncnn dependency packages

on:
  workflow_dispatch:
    inputs:
      target:
        description: Platform to build
        type: choice
        required: true
        default: all
        options:
          - all
          - linux
          - windows

permissions:
  contents: write

jobs:
  linux:
    name: Linux Ubuntu 18.04 x64
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'all' || inputs.target == 'linux' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Build in Ubuntu 18.04 container
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ubuntu:18.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential ca-certificates cmake file git ninja-build pkg-config python3 tar wget libvulkan-dev

              CMAKE_VERSION=3.22.6
              CMAKE_MAJOR_MINOR="${CMAKE_VERSION%.*}"
              CMAKE_INSTALL_DIR=/opt/cmake-${CMAKE_VERSION}-linux-x86_64
              wget -q -O /tmp/cmake-linux-x86_64.tar.gz \
                "https://cmake.org/files/v${CMAKE_MAJOR_MINOR}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz"
              tar -C /opt -xzf /tmp/cmake-linux-x86_64.tar.gz
              export PATH="$CMAKE_INSTALL_DIR/bin:$PATH"
              cmake --version

              for safe_dir in \
                /work \
                /work/opencv \
                /work/ncnn \
                /work/ncnn/glslang \
                /work/ncnn/python/pybind11; do
                git config --global --add safe.directory "$safe_dir"
              done
              git submodule sync --recursive
              git submodule update --init --recursive opencv ncnn

              rm -rf /work/package-root /work/artifacts
              mkdir -p /work/artifacts

              pkg_config_version() {
                local pkg="$1"
                local root="$2"
                local pc pc_dir
                pc="$(find "$root" -type f -name "$pkg.pc" -print -quit)"
                if [[ -z "$pc" ]]; then
                  echo "unknown ($pkg.pc not found)"
                  return 0
                fi
                pc_dir="$(dirname "$pc")"
                if PKG_CONFIG_PATH="$pc_dir" pkg-config --exists "$pkg"; then
                  PKG_CONFIG_PATH="$pc_dir" pkg-config --modversion "$pkg"
                else
                  echo "unknown (pkg-config failed for $pkg)"
                fi
              }

              build_ncnn() {
                if [[ ! -f "$NCNN_SRC/CMakeLists.txt" ]]; then
                  echo "ncnn source not found: $NCNN_SRC" >&2
                  exit 1
                fi
                if [[ "$WITH_VULKAN" == "ON" && ! -f "$NCNN_SRC/glslang/CMakeLists.txt" ]]; then
                  echo "ncnn Vulkan build requires the glslang submodule." >&2
                  echo "Run: git submodule update --init --recursive ncnn" >&2
                  exit 1
                fi

                mkdir -p "$BUILD_DIR"
                cmake_args=(
                  -G Ninja
                  -DCMAKE_BUILD_TYPE=Release
                  -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR"
                  -DCMAKE_POSITION_INDEPENDENT_CODE=ON
                  -DNCNN_SHARED_LIB="$NCNN_SHARED_LIB"
                  -DNCNN_INSTALL_SDK=ON
                  -DNCNN_VULKAN="$WITH_VULKAN"
                  -DNCNN_SYSTEM_GLSLANG=OFF
                  -DNCNN_OPENMP="$NCNN_OPENMP"
                  -DNCNN_AVX512=OFF
                  -DNCNN_AVX512VNNI=OFF
                  -DNCNN_AVX512BF16=OFF
                  -DNCNN_AVX512FP16=OFF
                  -DNCNN_BUILD_TOOLS=OFF
                  -DNCNN_BUILD_EXAMPLES=OFF
                  -DNCNN_BUILD_BENCHMARK=OFF
                  -DNCNN_BUILD_TESTS=OFF
                  -DNCNN_PYTHON=OFF
                )

                (cd "$BUILD_DIR" && cmake "${cmake_args[@]}" "$NCNN_SRC")
                cmake --build "$BUILD_DIR" -- -j "$JOBS"
                cmake --build "$BUILD_DIR" --target install
              }

              export PKG_NAME=opencv-linux-ubuntu-18.04-x64
              export OPENCV_SRC=/work/opencv
              export INSTALL_DIR=/work/package-root/$PKG_NAME
              export BUILD_DIR=/work/build-opencv-linux
              export WITH_VULKAN=ON
              export JOBS="$(nproc)"
              rm -rf "$BUILD_DIR" "$INSTALL_DIR"
              bash ./build.sh


              {
                echo "OpenCV: $(pkg_config_version opencv4 "$INSTALL_DIR")"
                echo "Platform: linux-ubuntu-18.04-x64"
                echo "Modules: ${MODULES:-core,imgproc,imgcodecs}"
                echo "Vulkan: required"
                echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              } > "$INSTALL_DIR/BUILD_INFO.txt"

              tar -C /work/package-root -czf /work/artifacts/$PKG_NAME.tar.gz "$PKG_NAME"

              export PKG_NAME=ncnn-linux-ubuntu-18.04-x64
              export NCNN_SRC=/work/ncnn
              export INSTALL_DIR=/work/package-root/$PKG_NAME
              export BUILD_DIR=/work/build-ncnn-linux
              export WITH_VULKAN=ON
              export NCNN_SHARED_LIB=ON
              export NCNN_OPENMP=ON
              export JOBS="$(nproc)"
              rm -rf "$BUILD_DIR" "$INSTALL_DIR"
              build_ncnn

              mkdir -p "$INSTALL_DIR/lib"
              gomp_lib="$(gcc -print-file-name=libgomp.so.1)"
              if [[ ! -f "$gomp_lib" ]]; then
                echo "libgomp.so.1 not found." >&2
                exit 1
              fi
              cp -L "$gomp_lib" "$INSTALL_DIR/lib/"

              {
                echo "ncnn: $(pkg_config_version ncnn "$INSTALL_DIR")"
                echo "Platform: linux-ubuntu-18.04-x64"
                echo "Vulkan: required"
                echo "Shared lib: ON"
                echo "OpenMP: ON"
                echo "Bundled dependencies: libgomp only"
                echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              } > "$INSTALL_DIR/BUILD_INFO.txt"

              tar -C /work/package-root -czf /work/artifacts/$PKG_NAME.tar.gz "$PKG_NAME"
            '

      - uses: actions/upload-artifact@v4
        with:
          name: opencv-linux-ubuntu-18.04-x64
          path: artifacts/opencv-linux-ubuntu-18.04-x64.tar.gz
          if-no-files-found: error
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: ncnn-linux-ubuntu-18.04-x64
          path: artifacts/ncnn-linux-ubuntu-18.04-x64.tar.gz
          if-no-files-found: error
          retention-days: 7

  windows:
    name: Windows MinGW UCRT64 x64
    runs-on: windows-latest
    if: ${{ inputs.target == 'all' || inputs.target == 'windows' }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            tar
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-vulkan-loader

      - name: Build and package
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive opencv ncnn

          rm -rf package-root artifacts
          mkdir -p artifacts

          pkg_config_version() {
            local pkg="$1"
            local root="$2"
            local pc pc_dir
            pc="$(find "$root" -type f -name "$pkg.pc" -print -quit)"
            if [[ -z "$pc" ]]; then
              echo "unknown ($pkg.pc not found)"
              return 0
            fi
            pc_dir="$(dirname "$pc")"
            if PKG_CONFIG_PATH="$pc_dir" pkg-config --exists "$pkg"; then
              PKG_CONFIG_PATH="$pc_dir" pkg-config --modversion "$pkg"
            else
              echo "unknown (pkg-config failed for $pkg)"
            fi
          }

          build_ncnn() {
            if [[ ! -f "$NCNN_SRC/CMakeLists.txt" ]]; then
              echo "ncnn source not found: $NCNN_SRC" >&2
              exit 1
            fi
            if [[ "$WITH_VULKAN" == "ON" && ! -f "$NCNN_SRC/glslang/CMakeLists.txt" ]]; then
              echo "ncnn Vulkan build requires the glslang submodule." >&2
              echo "Run: git submodule update --init --recursive ncnn" >&2
              exit 1
            fi

            mkdir -p "$BUILD_DIR"
            cmake_args=(
              -G Ninja
              -DCMAKE_BUILD_TYPE=Release
              -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR"
              -DCMAKE_POSITION_INDEPENDENT_CODE=ON
              -DNCNN_SHARED_LIB="$NCNN_SHARED_LIB"
              -DNCNN_INSTALL_SDK=ON
              -DNCNN_VULKAN="$WITH_VULKAN"
              -DNCNN_SYSTEM_GLSLANG=OFF
              -DNCNN_OPENMP="$NCNN_OPENMP"
              -DNCNN_BUILD_TOOLS=OFF
              -DNCNN_BUILD_EXAMPLES=OFF
              -DNCNN_BUILD_BENCHMARK=OFF
              -DNCNN_BUILD_TESTS=OFF
              -DNCNN_PYTHON=OFF
            )

            (cd "$BUILD_DIR" && cmake "${cmake_args[@]}" "$NCNN_SRC")
            cmake --build "$BUILD_DIR" -- -j "$JOBS"
            cmake --build "$BUILD_DIR" --target install
          }

          export PKG_NAME=opencv-windows-mingw-ucrt64-x64
          export OPENCV_SRC="$PWD/opencv"
          export INSTALL_DIR="$PWD/package-root/$PKG_NAME"
          export BUILD_DIR="$PWD/build-opencv-windows"
          export WITH_VULKAN=ON
          export JOBS="$(nproc)"
          rm -rf "$BUILD_DIR" "$INSTALL_DIR"
          bash ./build.sh


          # Do not package real static archives on Windows.
          # Keep MinGW .dll.a import libraries because they are required to link against the packaged DLLs.
          find "$INSTALL_DIR" -type f -name "*.a" ! -name "*.dll.a" -print -delete

          {
            echo "OpenCV: $(pkg_config_version opencv4 "$INSTALL_DIR")"
            echo "Platform: windows-mingw-ucrt64-x64"
            echo "Modules: ${MODULES:-core,imgproc,imgcodecs}"
            echo "Vulkan: required"
            echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$INSTALL_DIR/BUILD_INFO.txt"

          tar -C package-root -czf "artifacts/$PKG_NAME.tar.gz" "$PKG_NAME"

          export PKG_NAME=ncnn-windows-mingw-ucrt64-x64
          export NCNN_SRC="$PWD/ncnn"
          export INSTALL_DIR="$PWD/package-root/$PKG_NAME"
          export BUILD_DIR="$PWD/build-ncnn-windows"
          export WITH_VULKAN=ON
          export NCNN_SHARED_LIB=ON
          export NCNN_OPENMP=ON
          export JOBS="$(nproc)"
          rm -rf "$BUILD_DIR" "$INSTALL_DIR"
          build_ncnn

          mkdir -p "$INSTALL_DIR/bin"
          if [[ ! -f /ucrt64/bin/libgomp-1.dll ]]; then
            echo "libgomp-1.dll not found." >&2
            exit 1
          fi
          cp -L /ucrt64/bin/libgomp-1.dll "$INSTALL_DIR/bin/"

          # Do not package real static archives on Windows.
          # Keep MinGW .dll.a import libraries because they are required to link against the packaged DLLs.
          find "$INSTALL_DIR" -type f -name "*.a" ! -name "*.dll.a" -print -delete

          {
            echo "ncnn: $(pkg_config_version ncnn "$INSTALL_DIR")"
            echo "Platform: windows-mingw-ucrt64-x64"
            echo "Vulkan: required"
            echo "Shared lib: ON"
            echo "OpenMP: ON"
            echo "Bundled dependencies: libgomp only"
            echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$INSTALL_DIR/BUILD_INFO.txt"

          tar -C package-root -czf "artifacts/$PKG_NAME.tar.gz" "$PKG_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: opencv-windows-mingw-ucrt64-x64
          path: artifacts/opencv-windows-mingw-ucrt64-x64.tar.gz
          if-no-files-found: error
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: ncnn-windows-mingw-ucrt64-x64
          path: artifacts/ncnn-windows-mingw-ucrt64-x64.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-artifacts/*.tar.gz)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release artifacts found." >&2
            find release-artifacts -type f -print >&2 || true
            exit 1
          fi

          tag_name="$(date -u +%Y%m%d)"
          release_name="OpenCV and ncnn dependency packages ${tag_name}"

          {
            echo "OpenCV and ncnn dependency packages."
            echo
            echo "Date tag: ${tag_name}"
            echo "Target: ${{ inputs.target }}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Workflow run: ${GITHUB_RUN_NUMBER}"
            echo
            echo "Artifacts:"
            for asset in "${assets[@]}"; do
              echo "- $(basename "$asset")"
            done
          } > RELEASE_NOTES.md

          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release delete "$tag_name" --yes --cleanup-tag
          elif gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$tag_name" >/dev/null 2>&1; then
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/$tag_name"
          fi

          gh release create "$tag_name" "${assets[@]}" \
            --target "$GITHUB_SHA" \
            --title "$release_name" \
            --notes-file RELEASE_NOTES.md
